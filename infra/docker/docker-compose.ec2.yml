services:
  auth-service:
    ports: []
    expose:
      - "8001"
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://test.theairco.ai}
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
      KEYCLOAK_CLIENT_ID: ${AUTH_SERVICE_KEYCLOAK_CLIENT_ID:-frontend-app}
      KEYCLOAK_CLIENT_SECRET: ${AUTH_SERVICE_KEYCLOAK_CLIENT_SECRET:-REPLACE_ME}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://airco:change-me-app-db-password@app-postgres:5432/auth_db}

  file-service:
    ports: []
    expose:
      - "8002"
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}@rabbitmq:5672/
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

  pdf-service:
    ports: []
    expose:
      - "8003"
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8004}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}@rabbitmq:5672/
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}


  ai-service:
    ports: []
    expose:
      - "8004"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}@rabbitmq:5672/
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://pdf-service:8003}
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL:-http://report-service:8005}

  report-service:
    ports: []
    expose:
      - "8005"
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8004}
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://pdf-service:8003}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}@rabbitmq:5672/
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}


  app-postgres:
    ports: []
    expose:
      - "5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data

  backend:
    ports: []
    expose:
      - "8000"
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL:-http://file-service:8002}
      PDF_SERVICE_URL: ${PDF_SERVICE_URL:-http://pdf-service:8003}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8004}
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL:-http://report-service:8005}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}@rabbitmq:5672/
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      S3_SKIP_CREATE_BUCKET: ${S3_SKIP_CREATE_BUCKET:-true}
      S3_BUCKET: ${S3_BUCKET:-airco-files}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS:-airco-reports}
      STORAGE_TYPE: ${STORAGE_TYPE:-supabase-s3}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-7}
      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_SWEEP_INTERVAL_MINUTES: ${RETENTION_SWEEP_INTERVAL_MINUTES:-60}
    depends_on:
      auth-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      app-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  frontend:
    ports: []
    expose:
      - "3000"
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://test.theairco.ai}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://test.theairco.ai}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-frontend-app}
        NEXT_PUBLIC_AIRCO_API_KEY: ${NEXT_PUBLIC_AIRCO_API_KEY:-REPLACE_ME}
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://test.theairco.ai}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-https://test.theairco.ai}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-frontend-app}
      NEXT_PUBLIC_AIRCO_API_KEY: ${NEXT_PUBLIC_AIRCO_API_KEY:-REPLACE_ME}

  keycloak-postgres:
    ports: []
    expose:
      - "5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

  keycloak:
    ports: []
    expose:
      - "8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin}
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db}
      KC_HOSTNAME: https://${PUBLIC_DOMAIN:-test.theairco.ai}
      KC_HOSTNAME_ADMIN: https://${PUBLIC_DOMAIN:-test.theairco.ai}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /
      KC_HEALTH_ENABLED: "true"
      KC_CORS: "true"
      KC_HTTP_CORS_ORIGINS: ${KC_HTTP_CORS_ORIGINS:-https://test.theairco.ai}
      KC_HTTP_CORS_ALLOWED_ORIGINS: ${KC_HTTP_CORS_ALLOWED_ORIGINS:-https://test.theairco.ai}

  redis:
    ports: []
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    ports: []
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-change-me-rabbitmq-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nginx:
    build:
      context: ../nginx
    container_name: airco_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - airco-network
    ports:
      - "80:80"
      - "443:443"
    environment:
      AIRCO_PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-test.theairco.ai}
      AIRCO_SSL_CERT_PATH: /etc/airco/ssl/fullchain.pem
      AIRCO_SSL_KEY_PATH: /etc/airco/ssl/privkey.pem
    volumes: !override
      - ${CERTBOT_WEBROOT_DIR:-/opt/airco/certbot}:/var/www/certbot:ro
      - ${SSL_CERTS_DIR:-/opt/airco/ssl}:/etc/airco/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  backend_tmp:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  app_postgres_data:
    driver: local
  keycloak_postgres_data:
    driver: local

