services:
  backend:
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      S3_SKIP_CREATE_BUCKET: ${S3_SKIP_CREATE_BUCKET:-true}
      S3_BUCKET: ${S3_BUCKET:-airco-files}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS:-airco-reports}
      STORAGE_TYPE: ${STORAGE_TYPE:-supabase-s3}
      # Local Keycloak issues iss=http://localhost:8080/... — do not use remote KEYCLOAK_URL from .env
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-airco-insights}
      KEYCLOAK_ALLOWED_AZP: ${KEYCLOAK_ALLOWED_AZP:-frontend-app}
      API_KEY_ENVIRONMENT: ${API_KEY_ENVIRONMENT:-test}
      API_KEY_RATE_LIMIT_DEFAULT: ${API_KEY_RATE_LIMIT_DEFAULT:-60}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-7}
      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_SWEEP_INTERVAL_MINUTES: ${RETENTION_SWEEP_INTERVAL_MINUTES:-60}
      TEMP_DIR: /app/tmp
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_tmp:/app/tmp

  frontend:
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-frontend-app}

  auth-service:
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-airco-insights}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-frontend-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-airco-frontend-secret-2024-secure-key-abc123xyz}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-in-production}

  keycloak:
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db}
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /

  rabbitmq:

    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

  redis:
    ports:
      - "6379:6379"

  # Removed missing microservices from this Lite layout:
  # file-service, pdf-service, ai-service, report-service
  # app-postgres removed — database is Supabase cloud
