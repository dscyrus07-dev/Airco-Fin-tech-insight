services:
  auth-service:
    build: ../../auth/auth-service
    container_name: airco_auth_service
    restart: always
    networks:
      - airco-network
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-in-production}
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-airco-insights}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-frontend-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-airco-frontend-secret-2024-secure-key-abc123xyz}
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started

  backend:
    build: ../../backend
    container_name: airco_backend
    restart: always
    networks:
      - airco-network
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      TEMP_DIR: /app/tmp
      PYTHONUNBUFFERED: "1"
      AUTH_SERVICE_URL: http://auth-service:8001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-ap-southeast-2}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      S3_SKIP_CREATE_BUCKET: ${S3_SKIP_CREATE_BUCKET:-true}
      S3_BUCKET: ${S3_BUCKET:-airco-files}
      S3_BUCKET_REPORTS: ${S3_BUCKET_REPORTS:-airco-reports}
      STORAGE_TYPE: ${STORAGE_TYPE:-supabase-s3}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-7}

      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_SWEEP_INTERVAL_MINUTES: ${RETENTION_SWEEP_INTERVAL_MINUTES:-60}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-airco-insights}
      KEYCLOAK_ALLOWED_AZP: ${KEYCLOAK_ALLOWED_AZP:-frontend-app}
      AUTH_ALLOW_INSECURE_FALLBACK: ${AUTH_ALLOW_INSECURE_FALLBACK:-false}
      API_KEY_ENVIRONMENT: ${API_KEY_ENVIRONMENT:-test}
      API_KEY_RATE_LIMIT_DEFAULT: ${API_KEY_RATE_LIMIT_DEFAULT:-60}
    volumes:
      - backend_tmp:/app/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:

    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-frontend-app}
    container_name: airco_frontend
    restart: always
    networks:
      - airco-network
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      AUTH_SERVICE_URL: http://auth-service:8001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-airco-insights}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-frontend-app}
    depends_on:
      backend:
        condition: service_started

  keycloak-postgres:
    image: postgres:15
    container_name: keycloak-postgres
    restart: unless-stopped
    networks:
      - airco-network
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev --http-port=8080 --hostname-strict=false
    restart: unless-stopped
    networks:
      - airco-network
    ports:
      - "8080:8080"
    environment:
      # Keycloak 26 bootstrap admin (replaces deprecated KEYCLOAK_ADMIN*)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin}
      # Keep legacy vars for older tooling that still reads them
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-keycloak-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak-db}
      KC_HEALTH_ENABLED: "true"
      # Hostname v2: avoid deprecated hostname-port / proxy / hostname-strict-https
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      # Probe OIDC discovery, not welcome page (welcome page NPE on incomplete Host)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 5 cat <&3 | grep -q 'issuer'"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: airco_redis
    restart: always
    networks:
      - airco-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: airco_rabbitmq
    restart: always
    networks:
      - airco-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:

    image: nginx:alpine
    container_name: airco_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - airco-network
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  airco-network:
    driver: bridge

volumes:
  backend_tmp:
  redis_data:
  rabbitmq_data:
  keycloak_postgres_data:

